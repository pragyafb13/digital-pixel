<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Digital Pixel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <script>(function(){var t=localStorage.getItem('dp-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    .auth-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 120px 5% 60px; position: relative; overflow: hidden;
      background: var(--bg);
    }
    .auth-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 60%);
    }
    [data-theme="light"] .auth-bg {
      background: radial-gradient(ellipse 60% 60% at 50% 0%, rgba(124,58,237,0.08) 0%, transparent 60%);
    }
    .auth-card {
      position: relative; z-index: 2;
      width: 100%; max-width: 440px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 24px; padding: 44px 40px;
    }
    [data-theme="light"] .auth-card {
      background: #fff;
      box-shadow: 0 20px 60px rgba(124,58,237,0.10);
    }
    .auth-card::before {
      content: ''; position: absolute; top: -1px; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple), var(--grad-end), transparent);
    }
    .auth-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; font-weight: 800; font-size: 1.15rem;
      margin-bottom: 32px; justify-content: center;
    }
    .auth-logo .logo-icon { width: 36px; height: 36px; }
    .auth-logo .logo-icon svg { width: 100%; height: 100%; }
    .auth-logo .logo-text span:first-child { color: var(--text-strong); }
    .auth-logo .logo-text span:last-child {
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .auth-title {
      font-size: 1.7rem; font-weight: 900; color: var(--text-strong);
      text-align: center; margin-bottom: 8px; letter-spacing: -0.02em;
    }
    .auth-sub { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }
    .auth-sub a { color: var(--purple); text-decoration: none; font-weight: 600; }
    .auth-sub a:hover { text-decoration: underline; }
    .auth-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      color: #fff; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
      margin-top: 8px; position: relative; overflow: hidden;
    }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.4); }
    .auth-divider {
      display: flex; align-items: center; gap: 14px;
      margin: 24px 0; color: var(--muted); font-size: 0.82rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .social-login { display: flex; gap: 10px; }
    .social-login-btn {
      flex: 1; padding: 11px; border-radius: 11px;
      border: 1px solid var(--border); background: var(--input-bg);
      color: var(--text); cursor: pointer; font-family: inherit;
      font-size: 0.85rem; font-weight: 600; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .social-login-btn:hover { border-color: var(--purple); background: var(--card); }
    .forgot-link {
      color: var(--purple); font-size: 0.82rem; font-weight: 600;
      text-decoration: none; display: block; text-align: right; margin-top: -12px; margin-bottom: 20px;
    }
    .forgot-link:hover { text-decoration: underline; }
    .form-row { display: flex; gap: 14px; }
    .form-row .form-group { flex: 1; }
    .password-wrapper { position: relative; }
    .password-wrapper .form-input { padding-right: 48px; }
    .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 1rem; padding: 0;
    }
    .terms-note {
      text-align: center; font-size: 0.78rem; color: var(--muted);
      margin-top: 20px; line-height: 1.5;
    }
    .terms-note a { color: var(--purple); text-decoration: none; }
    .terms-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div id="nav-root"></div>

<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <a href="index.html" class="auth-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" fill="none"><defs><linearGradient id="al" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop stop-color="#7C3AED"/><stop offset="1" stop-color="#06B6D4"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#al)" opacity="0.15"/><rect x="6" y="6" width="28" height="28" rx="7" stroke="url(#al)" stroke-width="1.5" fill="none"/><rect x="11" y="11" width="18" height="18" rx="4" stroke="url(#al)" stroke-width="1.5" fill="none"/><circle cx="20" cy="20" r="4" fill="url(#al)"/></svg>
      </div>
      <div class="logo-text"><span>Digital</span><span> Pixel</span></div>
    </a>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Don't have an account? <a href="signup.html">Sign up free</a></p>

    <div class="social-login">
      <button class="social-login-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="social-login-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994.021-.041.001-.09-.041-.106a13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>
        Discord
      </button>
    </div>

    <div class="auth-divider">or sign in with email</div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" class="form-input" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" class="form-input" id="pw-field" placeholder="Enter your password" required>
          <button type="button" class="eye-btn" onclick="togglePw()">👁</button>
        </div>
      </div>
      <a href="#" class="forgot-link">Forgot password?</a>
      <button type="submit" class="auth-btn">Sign In →</button>
    </form>

    <p class="terms-note">By signing in, you agree to our <a href="terms.html">Terms of Use</a> and <a href="privacy.html">Privacy Policy</a>.</p>
  </div>
</div>

<div id="footer-root"></div>
<script src="nav.js"></script>
<script>
function togglePw() {
  var f = document.getElementById('pw-field');
  f.type = f.type === 'password' ? 'text' : 'password';
}
function handleLogin(e) {
  e.preventDefault();
  var btn = e.target.querySelector('.auth-btn');
  btn.textContent = 'Signing in…';
  setTimeout(function() { window.location.href = 'index.html'; }, 1200);
}
</script>
</body>
</html>
